name: Download Spread 11:10 NY

on:
  schedule:
    # Run at 15:10 UTC and 16:10 UTC to cover both EDT (UTC-4) and EST (UTC-5)
    # The job itself will exit early if the New York time is not 11:xx
    - cron: '10 16 * * 1-5'
    - cron: '10 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  download-spread:
    runs-on: ubuntu-slim
    strategy:
      fail-fast: true
    
    steps:
      - name: Check New York time window
        id: time_check
        run: |
          NY_HOUR=$(TZ=America/New_York date +'%H')
          NY_MIN=$(TZ=America/New_York date +'%M')
          echo "Current New York time: $NY_HOUR:$NY_MIN"
          
          # Accept 10:45 to 11:59
          if [[ "$NY_HOUR" == "11" ]] || [[ "$NY_HOUR" == "10" && 10#$NY_MIN -ge 45 ]]; then
            echo "Within 10:45-11:59 NY time window. Proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "Outside target window. Skipping this trigger."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.time_check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for recent download (within last 2 hours)
        if: steps.time_check.outputs.skip == 'false'
        id: recent_check
        run: |
          NY_DATE=$(TZ=America/New_York date +'%Y%m%d')
          # Check for current likely folder (10:50/11:10 -> _10) and late runs (_11)
          if ls spread/${NY_DATE}_10/*.csv >/dev/null 2>&1 || ls spread/${NY_DATE}_11/*.csv >/dev/null 2>&1; then
            echo "Recent download detected in spread/${NY_DATE}_10/ or _11/ — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No recent download found. Proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.time_check.outputs.skip == 'false' && steps.recent_check.outputs.skip == 'false'
        run: pip install pandas yfinance numpy pytz

      - name: Run spread download script
        if: steps.time_check.outputs.skip == 'false' && steps.recent_check.outputs.skip == 'false'
        id: download
        run: |
          python download_option_spread.py > /tmp/work_log.txt 2>&1
          cat /tmp/work_log.txt
          
          # Organize into date_hour folder using (New York Time + 10 minutes)
          # threshold at 50 mins: 10:50 -> _11, 11:10 -> _11, 11:50 -> _12
          DIR="spread/$(TZ=America/New_York date -d '+10 minutes' +'%Y%m%d_%H')"
          mkdir -p "$DIR"
          mv spread/*.csv "$DIR/" 2>/dev/null || true
          
          echo "log<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/work_log.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Write work summary
        if: steps.time_check.outputs.skip == 'false' && steps.recent_check.outputs.skip == 'false'
        run: |
          echo "## Spread Download Summary (Target 11:00 NY)" >> $GITHUB_STEP_SUMMARY
          echo "Run completed on $(TZ=America/New_York date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Log" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.download.outputs.log }}" >> $GITHUB_STEP_SUMMARY

      - name: Commit and push spread data
        if: steps.time_check.outputs.skip == 'false' && steps.recent_check.outputs.skip == 'false'
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add spread/
          git diff --staged --quiet || git commit -m "Add spread data for 11:00 NY ($(TZ=America/New_York date +'%Y-%m-%d %Z'))"
          git push
