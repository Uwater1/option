name: Download Spread 11:00 EDT

on:
  schedule:
    # 11:00 EDT is 15:00 UTC
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  download-spread:
    runs-on: ubuntu-slim
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install pandas yfinance numpy

      - name: Run spread download script
        id: download
        run: |
          python download_option_spread.py > /tmp/work_log.txt 2>&1
          cat /tmp/work_log.txt
          
          # Organize into date_hour folder
          DIR="spread/$(date +'%Y%m%d_%H')"
          mkdir -p "$DIR"
          mv spread/*.csv "$DIR/" 2>/dev/null || true
          
          echo "log<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/work_log.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Write work summary
        run: |
          echo "## Spread Download Summary (11:00 EDT)" >> $GITHUB_STEP_SUMMARY
          echo "Run completed on $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Log" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.download.outputs.log }}" >> $GITHUB_STEP_SUMMARY

      - name: Commit and push spread data
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add spread/
          git diff --staged --quiet || git commit -m "Add spread data for 11:00 EDT"
          git push
