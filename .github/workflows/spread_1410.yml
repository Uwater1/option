name: Download Spread 14:10 NY

on:
  schedule:
    # Summer/Spring/Early Autumn
    - cron: '10 18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  download-spread:
    runs-on: ubuntu-slim
    strategy:
      fail-fast: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install pandas yfinance numpy pytz

      - name: Run spread download script
        id: download
        run: |
          python download_option_spread.py > /tmp/work_log.txt 2>&1
          cat /tmp/work_log.txt
          
          # Organize into date_hour folder using (New York Time + 10 minutes)
          # threshold at 50 mins: 14:50 -> _15, 15:10 -> _15, 15:50 -> _16
          DIR="spread/$(TZ=America/New_York date -d '+10 minutes' +'%Y%m%d_%H')"
          mkdir -p "$DIR"
          mv spread/*.csv "$DIR/" 2>/dev/null || true
          
          echo "log<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/work_log.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Write work summary
        run: |
          echo "## Spread Download Summary (Target 14:10 NY)" >> $GITHUB_STEP_SUMMARY
          echo "Run completed on $(TZ=America/New_York date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Log" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.download.outputs.log }}" >> $GITHUB_STEP_SUMMARY

      - name: Commit and push spread data
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add spread/
          git diff --staged --quiet || git commit -m "Add spread data for 11:00 NY ($(TZ=America/New_York date +'%Y-%m-%d %Z'))"
          git push
